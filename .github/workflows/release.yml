name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ github.ref_name }}" --generate-notes

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: m5d215/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: homebrew-tap

      - name: Bump formula
        working-directory: homebrew-tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          sed -i -E "s|tag: \"v[0-9]+\.[0-9]+\.[0-9]+\"|tag: \"${TAG}\"|" Formula/agent-salon.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-salon.rb
          if git diff --cached --quiet; then
            echo "formula already at ${TAG}; skipping commit"
            exit 0
          fi
          git commit -m "agent-salon: bump to ${TAG}"
          git push
